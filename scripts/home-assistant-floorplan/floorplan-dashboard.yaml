  # 以下是同一 Dashboard 内的房间子页面。
  # 灯具数量不一致时，可按实际情况增删 tile。
  - title: 主卧灯光
    path: master-bedroom
    subview: true
    back_path: /xiangshan-floorplan/home
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: light.master_bedroom_ceiling
            name: 主灯
          - type: tile
            entity: light.master_bedroom_spotlights
            name: 射灯
          - type: tile
            entity: light.master_bedroom_bedside
            name: 床头灯

  - title: 主卫灯光
