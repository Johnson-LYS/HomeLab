# 香山府 Home Assistant 户型灯光面板
#
# 主卧、主卫、厨房、次卫、次卧、书房、客厅、餐厅和洗手台绑定灯光组。
# 这些组由 light-groups-snippet.yaml 创建；任意成员开启时，组状态即为 on。
# 玄关 light.entry 与阳台 light.balcony 直接绑定单灯。
#
# 单击房间按钮：切换整个房间灯光组。
# 长按多灯房间：进入同一 Dashboard 内的单灯子页面。
# 长按玄关/阳台：打开该单灯的更多信息。

views:
  - title: 香山府
    path: home
    icon: mdi:floor-plan
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: button
                name: 全部关闭
                icon: mdi:lightbulb-group-off-outline
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: light.turn_off
                  target:
                    entity_id:
                      - light.master_bedroom
                      - light.master_bathroom
                      - light.kitchen
                      - light.second_bathroom
                      - light.second_bedroom
                      - light.study
                      - light.balcony
                      - light.living_room
                      - light.dining_room
                      - light.entry
                      - light.washstand
              - type: button
                name: 全部打开
                icon: mdi:lightbulb-group
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id:
                      - light.master_bedroom
                      - light.master_bathroom
                      - light.kitchen
                      - light.second_bathroom
                      - light.second_bedroom
                      - light.study
                      - light.balcony
                      - light.living_room
                      - light.dining_room
                      - light.entry
                      - light.washstand

          - type: picture-elements
            title: 香山府灯光
            image: /local/floorplan/base.png
            elements:
              # 普通透明房间图层
              - type: image
                entity: light.master_bedroom
                title: null
                image: /local/floorplan/master-bedroom-on.png
                filter: none
                state_filter:
                  "on": opacity(1)
                  "off": opacity(0)
                  unavailable: opacity(0)
                  unknown: opacity(0)
                tap_action:
                  action: none
                hold_action:
                  action: none
                style:
                  left: 50%
                  top: 50%
                  width: 100%
                  transform: translate(-50%, -50%)
                  pointer-events: none
                  z-index: 1

              - type: image
